<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - Claude Code 终极教程</title>
  <meta name="description" content="{{description}}">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    /* 基础样式 */
    :root {
      --primary: #D97706;
      --secondary: #059669;
      --bg: #ffffff;
      --bg-dark: #1f2937;
      --text: #1f2937;
      --text-dark: #f3f4f6;
      --border: #e5e7eb;
      --border-dark: #374151;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: var(--bg-dark);
        --text: var(--text-dark);
        --border: var(--border-dark);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }

    /* 导航 */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
    }

    nav a { text-decoration: none; color: var(--text); }
    nav a:hover { color: var(--primary); }

    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-weight: 500; }

    /* 主内容 */
    main { padding: 2rem 0; min-height: calc(100vh - 200px); }

    article {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 元信息 */
    .meta {
      display: flex;
      gap: 1rem;
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .badge-beginner { background: #dcfce7; color: #166534; }
    .badge-intermediate { background: #fef3c7; color: #92400e; }
    .badge-advanced { background: #fee2e2; color: #991b1b; }

    /* 目录 */
    .toc {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .toc h3 {
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toc h3::after {
      content: "▼";
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .toc.collapsed h3::after {
      transform: rotate(-90deg);
    }

    .toc.collapsed ul {
      display: none;
    }

    .toc ul {
      list-style: none;
      padding-left: 1rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .toc a { color: var(--primary); }
    .toc li { margin: 0.25rem 0; }

    /* 内容区 */
    .content h1 { font-size: 2rem; margin-bottom: 1rem; }
    .content h2 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .content h3 { font-size: 1.25rem; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .content p { margin-bottom: 1rem; }
    .content ul, .content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .content li { margin-bottom: 0.5rem; }
    .content code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875em; }
    .content pre { margin-bottom: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    .content pre code { background: transparent; padding: 0; }
    .content blockquote { border-left: 4px solid var(--primary); padding-left: 1rem; margin: 1rem 0; color: #6b7280; }
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .content th, .content td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
    .content th { background: #f9fafb; }

    /* Try It Now 区块 */
    .try-it-now {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 2px solid var(--primary);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin: 2rem 0;
    }

    .try-it-now h3 { color: #92400e; margin-top: 0; }
    .try-it-now::before { content: "🎯 "; }

    /* 页脚 */
    footer {
      background: #1f2937;
      color: #f3f4f6;
      padding: 2rem 0;
      margin-top: 4rem;
    }

    footer a { color: #fbbf24; }

    /* 面包屑 */
    .breadcrumb {
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .breadcrumb a { color: var(--primary); }

    /* 导航按钮 */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .nav-buttons a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--primary);
      color: white;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-buttons a:hover { background: #b45309; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" style="font-weight: bold; font-size: 1.25rem;">Claude Code 终极教程</a>
      <ul class="nav-links">
        <li><a href="/index.html">首页</a></li>
        <li><a href="/content/01-slash-commands.html">核心模块</a></li>
        <li><a href="/content/11-multi-agent.html">多 Agent</a></li>
        <li><a href="https://github.com/anthropics/claude-code" target="_blank">GitHub</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      {{content}}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Claude Code 终极教程 | <a href="https://github.com/anthropics/claude-code" target="_blank">GitHub</a></p>
      <p style="margin-top: 0.5rem; font-size: 0.875rem; opacity: 0.8;">
        本教程由社区维护，与 Anthropic 官方无关联
      </p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
  <script>
    // 高亮所有代码块
    document.querySelectorAll('pre code').forEach(block => {
      Prism.highlightElement(block);
    });

    // 目录折叠功能
    document.querySelectorAll('.toc h3').forEach(h3 => {
      h3.addEventListener('click', () => {
        h3.parentElement.classList.toggle('collapsed');
      });
    });

    // 如果目录超过 15 项，默认折叠
    document.querySelectorAll('.toc').forEach(toc => {
      if (toc.querySelectorAll('li').length > 15) {
        toc.classList.add('collapsed');
      }
    });
  </script>
</body>
</html>
